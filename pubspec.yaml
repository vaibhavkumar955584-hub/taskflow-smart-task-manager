name: taskflow_smart_task_manager
description: TaskFlow is a personalized Flutter task manager built by Vaibhav Kumar.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^4.17.5
  cupertino_icons: ^1.0.8
  firebase_auth: ^4.16.0
  firebase_core: ^2.32.0
  flutter_local_notifications: ^17.2.2
  http: ^1.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
